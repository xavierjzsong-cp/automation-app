name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.1.0"
        required: true
        type: string

jobs:
  checks:
    name: Release checks
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile Python files
        shell: pwsh
        run: python -m compileall -q run_ui.py src

      - name: Import core modules
        shell: pwsh
        run: python -c "from src.services.template_generation_service import GenerationRequest, GenerationResult, TemplateGenerationService; from src.parsers.pots_doc_parser import PotsDocParser; from src.routers.partner_router import PartnerRouter; from src.mappers.jfe_mapper import JfeMapper; from src.mappers.tsh_mapper import TshMapper; from src.mappers.vam_mapper import VamMapper; from src.adapters.jfe_adapter import JfeAdapter; from src.adapters.tsh_adapter import TshAdapter; from src.adapters.vam_adapter import VamAdapter; from src.writers.template_writer import TemplateWriter; from src.utils.app_paths import resource_path, get_ui_settings_path; print(resource_path('config/partners.yml')); print(get_ui_settings_path()); print('ok')"

      - name: Validate YAML config
        shell: pwsh
        run: |
          python -c "import yaml; from pathlib import Path; partners=yaml.safe_load(Path('config/partners.yml').read_text(encoding='utf-8')); fields=yaml.safe_load(Path('config/field_mapping.yml').read_text(encoding='utf-8')); assert set(partners['partners']) == {'VAM', 'TSH', 'JFE', 'HT'}; assert partners['partners']['VAM']['urls']['homepage']; assert partners['partners']['VAM']['urls']['connection_datasheet']; assert partners['partners']['TSH']['urls']['homepage']; assert partners['partners']['TSH']['urls']['connection_datasheet']; assert partners['partners']['TSH']['urls']['blanking_dimensions']; assert {'od', 'wt', 'grade'} <= set(fields['fields']); print('yaml ok')"

      - name: Check parser behavior
        shell: pwsh
        run: |
          python -c "from src.parsers.pots_doc_parser import PotsDocParser; text='POTS Document number: 123 Rev: A\nCP Part Number ABC-001\nProduct Description Pup Joint 13CR(80) 5.5 17# VAM TOP BOX X 5.5 17# TSH WEDGE PIN OAL 120\nANSI/NACE MR0175/ISO 15156 (Yes/No) Yes\nQCP (Standard/Client Specific) Standard\n'; parsed=PotsDocParser().parse_text(text); assert parsed.part_number == 'ABC-001'; assert parsed.rev == 'A'; assert parsed.product_material_grade == '13CR(80)'; assert parsed.connections['upper'].family == 'VAM'; assert parsed.connections['lower'].family == 'TSH'; print('parser ok')"

      - name: Check router behavior
        shell: pwsh
        run: |
          python -c "from src.parsers.pots_doc_parser import PotsDocParser; from src.routers.partner_router import PartnerRouter; text='POTS Document number: 123 Rev: A\nCP Part Number ABC-001\nProduct Description Pup Joint 13CR(80) 5.5 17# VAM TOP BOX X 5.5 17# TSH WEDGE PIN OAL 120\nANSI/NACE MR0175/ISO 15156 (Yes/No) Yes\nQCP (Standard/Client Specific) Standard\n'; parsed=PotsDocParser().parse_text(text); result=PartnerRouter().route(parsed); targets=result['targets']; assert targets[0]['side'] == 'upper'; assert targets[0]['partner'] == 'VAM'; assert targets[1]['side'] == 'lower'; assert targets[1]['partner'] == 'TSH'; assert result['partners_involved'] == ['VAM', 'TSH']; assert result['shared_data']['drift_extraction'] is True; print('router ok')"

      - name: Check VAM mapper behavior
        shell: pwsh
        run: |
          python -c "from src.parsers.pots_doc_parser import PotsDocParser; from src.routers.partner_router import PartnerRouter; from src.mappers.vam_mapper import VamMapper; text='POTS Document number: 123 Rev: A\nCP Part Number ABC-001\nProduct Description Pup Joint 13CR(80) 5.5 17# VAM TOP BOX X 5.5 17# TSH WEDGE PIN OAL 120\nANSI/NACE MR0175/ISO 15156 (Yes/No) Yes\nQCP (Standard/Client Specific) Standard\n'; parsed=PotsDocParser().parse_text(text); routing=PartnerRouter().route(parsed); target=routing['targets'][0]; mapped=VamMapper().build_mapped_data(target=target, shared_data=routing['shared_data']); conn=mapped['connection']; assert mapped['partner'] == 'VAM'; assert mapped['side'] == 'upper'; assert mapped['drift_extraction'] is True; assert conn['name'] == 'TOP'; assert conn['od'] == '5-1/2'; assert conn['weight'] == '17.00'; assert conn['material_family'] == '13CR'; assert conn['yield_strength'] == '80'; assert conn['type'] == 'BOX'; print('vam mapper ok')"

      - name: Check VAM adapter data extraction
        shell: pwsh
        run: python scripts/check_vam_adapter.py

      - name: Check TSH mapper behavior
        shell: pwsh
        run: |
          python -c "from src.parsers.pots_doc_parser import PotsDocParser; from src.routers.partner_router import PartnerRouter; from src.mappers.tsh_mapper import TshMapper; text='POTS Document number: 123 Rev: A\nCP Part Number ABC-001\nProduct Description Pup Joint 13CR(80) 5.5 17# VAM TOP BOX X 5.5 17# TSH WEDGE PIN OAL 120\nANSI/NACE MR0175/ISO 15156 (Yes/No) Yes\nQCP (Standard/Client Specific) Standard\n'; parsed=PotsDocParser().parse_text(text); routing=PartnerRouter().route(parsed); target=routing['targets'][1]; mapped=TshMapper().build_mapped_data(target=target, shared_data=routing['shared_data']); conn=mapped['connection']; assert mapped['partner'] == 'TSH'; assert mapped['side'] == 'lower'; assert mapped['drift_extraction'] is True; assert conn['name'] == 'WEDGE'; assert conn['od'] == '5.500'; assert conn['weight'] == '17.00'; assert conn['material_family'] == '13CR'; assert conn['yield_strength'] == '80'; assert conn['type'] == 'PIN'; print('tsh mapper ok')"

      - name: Check JFE mapper behavior
        shell: pwsh
        run: python scripts/check_jfe_mapper.py

      - name: Check JFE adapter interface
        shell: pwsh
        run: python scripts/check_jfe_adapter.py

      - name: Check TSH adapter blanking extraction
        shell: pwsh
        run: python scripts/check_tsh_adapter.py

      - name: Check writer behavior
        shell: pwsh
        run: |
          python -c "from pathlib import Path; from tempfile import TemporaryDirectory; from openpyxl import Workbook, load_workbook; from src.parsers.pots_doc_parser import PotsDocParser; from src.writers.template_writer import TemplateWriter; text='POTS Document number: 123 Rev: A\nCP Part Number ABC-001\nProduct Description Pup Joint 13CR(80) 5.5 17# VAM TOP BOX X 5.5 17# TSH WEDGE PIN OAL 120\nANSI/NACE MR0175/ISO 15156 (Yes/No) Yes\nQCP (Standard/Client Specific) Standard\n'; parsed=PotsDocParser().parse_text(text); tmp=TemporaryDirectory(); root=Path(tmp.name); template=root/'template.xlsx'; output_dir=root/'out'; wb=Workbook(); ws=wb.active; ws.title='Target'; wb.save(template); result=TemplateWriter().write(parsed=parsed, template_path=template, output_dir=output_dir, target_sheet_name='Target', user_name='Tester'); output=Path(result['output_file']); assert output.exists(); wb2=load_workbook(output); sheet=wb2['Target']; assert sheet['B6'].value == 'ABC-001'; assert sheet['D6'].value == 'A'; assert sheet['B28'].value == '5.5 - 17# VAM TOP BOX'; assert sheet['B30'].value == '5.5 - 17# TSH W PIN'; assert sheet['B34'].value == 'STD'; assert sheet['H9'].value == '120.000 +/-.125'; wb2.close(); tmp.cleanup(); print('writer ok')"

      - name: Check service flow
        shell: pwsh
        run: |
          python -c "from pathlib import Path; from tempfile import TemporaryDirectory; import fitz; from openpyxl import Workbook, load_workbook; from src.services.template_generation_service import GenerationRequest, TemplateGenerationService; text='POTS Document number: 123 Rev: A\nCP Part Number ABC-001\nProduct Description Pup Joint 13CR(80) 5.5 17# VAM TOP BOX X 5.5 17# TSH WEDGE PIN OAL 120\nANSI/NACE MR0175/ISO 15156 (Yes/No) Yes\nQCP (Standard/Client Specific) Standard\n'; tmp=TemporaryDirectory(); root=Path(tmp.name); pdf=root/'input.pdf'; template=root/'template.xlsx'; output_dir=root/'out'; doc=fitz.open(); page=doc.new_page(); page.insert_text((72, 72), text); doc.save(pdf); doc.close(); wb=Workbook(); ws=wb.active; ws.title='Target'; wb.save(template); request=GenerationRequest(input_path=pdf, template_path=template, output_dir=output_dir, target_sheet_name='Target', user_name='Tester'); result=TemplateGenerationService().generate(request); output=Path(result.output_file); assert output.exists(); assert result.routing_result['targets'][0]['side'] == 'upper'; assert result.routing_result['targets'][0]['partner'] == 'VAM'; assert result.routing_result['targets'][1]['side'] == 'lower'; assert result.routing_result['targets'][1]['partner'] == 'TSH'; wb2=load_workbook(output); sheet=wb2['Target']; assert sheet['B6'].value == 'ABC-001'; assert sheet['D6'].value == 'A'; assert sheet['B28'].value == '5.5 - 17# VAM TOP BOX'; assert sheet['B30'].value == '5.5 - 17# TSH W PIN'; wb2.close(); tmp.cleanup(); print('service ok')"

      - name: Check service VAM adapter flow
        shell: pwsh
        run: python scripts/check_service_vam_flow.py

      - name: Check service TSH adapter flow
        shell: pwsh
        run: python scripts/check_service_tsh_flow.py

      - name: Print release placeholder
        shell: pwsh
        run: |
          Write-Host "Release workflow ran for ${{ inputs.version }}."
          Write-Host "Packaging and GitHub Release upload will be added after the build script and PyInstaller spec exist."
